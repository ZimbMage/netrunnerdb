<VirtualHost *:8080>
	ServerName sansansouth.com
	ServerAlias www.sansansouth.com
	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/html/nrdb/web

	<Directory /var/www/html/nrdb/web>
		Options FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

